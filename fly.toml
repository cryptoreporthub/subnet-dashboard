# fly.toml app configuration file generated for subnet-dashboard
# Triggering redeployment - 2026-06-14

app = "subnet-dashboard"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume for runtime/learning data (soul_map.json, predictions.json,
# SQLite caches under /app/data). The machine already has this volume attached;
# declaring it here makes the config match reality so deploys don't prompt.
[mounts]
  source = "data_volume"
  destination = "/app/data"