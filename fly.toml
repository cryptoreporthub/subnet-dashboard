# fly.toml app configuration file generated for subnet-dashboard
# Redeploy trigger — 2026-07-14: post-deploy start + health gate (machine left stopped)

app = "subnet-dashboard"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # String form preferred by current flyctl; keep machine warm (no idle stop).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[env]
  RUN_MODE = "web"
  BACKGROUND_ON_WEB = "on"
  # Keep prod boot light; Telegram needs a live session on the volume.
  MESSAGE_INTEL_LISTENER = "off"
  RESOLVER_REFRESH_MINUTES = "15"
  # Defer heavy resolver tick on boot — immediate=True wedges single-worker Fly.
  RESOLVER_BOOT_IMMEDIATE = "off"
  BOOT_BACKGROUND_SYNC_IMMEDIATE = "off"
  SUBNETS_LOAD_TIMEOUT_SECONDS = "12"
  # Defer live feed + subnet warmup so /health wins first minute after deploy.
  BOOT_DEFER_SECONDS = "45"
  MAX_IN_FLIGHT_REQUESTS = "12"
  LOAD_SHED_ACQUIRE_SECONDS = "2"
  HOMEPAGE_BUILD_TIMEOUT = "20"
  HOMEPAGE_SHELL_CACHE_SECONDS = "45"
  # N3: post-resolver auto-retrain (enabled post-N/O; needs >=30 gradeable rows)
  CALIBRATION_AUTO_RETRAIN = "on"
  # O1: conviction-threshold notify (opt-in alerts via AlertEngine)
  CONVICTION_ALERTS_ENABLED = "on"
  # O4: allow fly.dev + cryptoreporthub hostnames when DNS is pointed (see DEPLOY.md)
  ALLOWED_ORIGINS = "https://subnet-dashboard.fly.dev,https://dashboard.cryptoreporthub.com,https://cryptoreporthub.com"

# Persistent volume for runtime/learning data (soul_map.json, predictions.json,
# SQLite caches under /app/data). The machine already has this volume attached;
# declaring it here makes the config match reality so deploys don't prompt.
[mounts]
  source = "data_volume"
  destination = "/app/data"

# 256MB OOMs / stalls under pandas + live_subnets workers; health goes critical
# and the edge returns 0-byte timeouts ("no good candidate").
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
