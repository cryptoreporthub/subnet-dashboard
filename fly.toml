# fly.toml app configuration file generated for subnet-dashboard
# Redeploy trigger — 2026-07-14: post-deploy start + health gate (machine left stopped)

app = "subnet-dashboard"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[processes]
  web = "./scripts/fly_web_entrypoint.sh"
  # ponytail: worker process group disabled until ops scales a second machine with
  # volume strategy. A lone worker machine steals the only slot and kills HTTP.
  # Manual: fly scale count worker=1 after web=1 is confirmed healthy.

[http_service]
  internal_port = 8080
  force_https = true
  processes = ["web"]
  # String form preferred by current flyctl; keep machine warm (no idle stop).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[env]
  RUN_MODE = "web"
  # essential = pump ladder + resolver + whale warm (no live-subnet wedge on 1GB web)
  BACKGROUND_ON_WEB = "essential"
  # Keep prod boot light; Telegram needs a live session on the volume.
  MESSAGE_INTEL_LISTENER = "off"
  RESOLVER_REFRESH_MINUTES = "15"
  # Defer heavy resolver tick on boot — immediate=True wedges single-worker Fly.
  RESOLVER_BOOT_IMMEDIATE = "off"
  BOOT_BACKGROUND_SYNC_IMMEDIATE = "off"
  SUBNETS_LOAD_TIMEOUT_SECONDS = "6"
  HYDRATE_SUBNETS_TIMEOUT_SECONDS = "4"
  # Defer live feed + subnet warmup so /health wins the first minute after deploy.
  BOOT_DEFER_SECONDS = "45"
  MAX_IN_FLIGHT_REQUESTS = "12"
  LOAD_SHED_ACQUIRE_SECONDS = "2"
  HOMEPAGE_BUILD_TIMEOUT = "8"
  HOMEPAGE_SHELL_CACHE_SECONDS = "60"
  # Cap expensive scoring so hydrate storms cannot wedge the single worker (~36s 503).
  SCORE_CACHE_TTL = "120"
  PICK_HANDLER_TIMEOUT_SECONDS = "8"
  HOUR_PICK_CACHE_SECONDS = "60"
  BRAIN_LETTER_TIMEOUT_SECONDS = "8"
  BRAIN_LETTER_CACHE_SECONDS = "60"
  ENABLE_METRICS = "0"
  # Web process: keep CPU for GET / + hydrate; resolver/retrain belongs on worker.
  CALIBRATION_AUTO_RETRAIN = "off"
  CONVICTION_ALERTS_ENABLED = "off"
  PUMP_LADDER_REFRESH_MINUTES = "5"
  PUMP_LADDER_STALE_MINUTES = "8"
  WHALE_LEDGER_WARM_INTERVAL_MINUTES = "20"
  # O4: allow fly.dev + cryptoreporthub hostnames when DNS is pointed (see DEPLOY.md)
  ALLOWED_ORIGINS = "https://subnet-dashboard.fly.dev,https://dashboard.cryptoreporthub.com,https://cryptoreporthub.com"

# Persistent volume for runtime/learning data (soul_map.json, predictions.json,
# SQLite caches under /app/data). The machine already has this volume attached;
# declaring it here makes the config match reality so deploys don't prompt.
[mounts]
  source = "data_volume"
  destination = "/app/data"

# 256MB OOMs / stalls under pandas + live_subnets workers; health goes critical
# and the edge returns 0-byte timeouts ("no good candidate").
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
