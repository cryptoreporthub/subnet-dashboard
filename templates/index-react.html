<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimiVision Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        green: { DEFAULT: '#00ff88', dark: '#00cc6a' },
                        purple: { DEFAULT: '#8b5cf6', dark: '#7c3aed' },
                        obsidian: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background: linear-gradient(180deg, #020617 0%, #0f172a 50%, #1e293b 100%);
            min-height: 100vh; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div id="app" class="p-6">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-bold text-green-400 mb-6">SimiVision Dashboard</h1>
            <div id="status" class="mb-4 text-gray-400">Loading data...</div>
            <div id="subnets" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </div>
    
    <script>
        // Fetch and display subnets
        async function loadData() {
            try {
                const response = await fetch('/api/subnets');
                const data = await response.json();
                document.getElementById('status').textContent = `Source: ${data.meta.source} | Updated: ${data.meta.updated_at}`;
                
                const container = document.getElementById('subnets');
                container.innerHTML = '';
                
                data.subnets.slice(0, 6).forEach(sn => {
                    const card = document.createElement('div');
                    card.className = 'bg-gray-800/50 p-4 rounded-lg border border-gray-700';
                    card.innerHTML = `
                        <h3 class="text-lg font-semibold text-white">${sn.name}</h3>
                        <div class="text-sm text-gray-400">
                            <p>NetUID: ${sn.netuid}</p>
                            <p>Price: $${sn.price?.toFixed(4) || 'N/A'}</p>
                            <p>APY: ${(sn.apy || 0).toFixed(2)}%</p>
                            <p>24h: ${(sn.price_change_24h || 0).toFixed(2)}%</p>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('status').textContent = 'Error loading data: ' + err.message;
            }
        }
        
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
