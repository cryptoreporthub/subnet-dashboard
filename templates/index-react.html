<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimiVision Dashboard</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        green: {
                            DEFAULT: '#00ff88',
                            dark: '#00cc6a',
                            glow: '#00ff88aa',
                            faint: '#00ff8822',
                        },
                        purple: {
                            DEFAULT: '#8b5cf6',
                            dark: '#7c3aed',
                            glow: '#8b5cf6aa',
                        },
                        red: {
                            DEFAULT: '#ef4444',
                            dark: '#dc2626',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(0, 255, 136, 0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(0, 255, 136, 0.5)' },
                        },
                    },
                },
            },
        }
    </script>
    
    <style>
        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        body {
            background: linear-gradient(180deg, #020617 0%, #0f172a 50%, #1e293b 100%);
            min-height: 100vh;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        
        /* Glassmorphism Effects */
        .glass-panel {
            position: relative;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: linear-gradient(
                135deg,
                rgba(30, 41, 59, 0.7) 0%,
                rgba(45, 55, 72, 0.5) 50%,
                rgba(30, 41, 59, 0.7) 100%
            );
        }
        
        .glass-border {
            position: relative;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            outline: 1px solid rgba(0, 255, 136, 0.15);
            outline-offset: -1px;
        }
        
        .glass-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(
                45deg,
                rgba(0, 255, 136, 0.1),
                rgba(0, 255, 136, 0.2),
                rgba(139, 92, 246, 0.1),
                rgba(0, 255, 136, 0.1)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        /* Neon Glow Borders */
        .neon-border {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1), 0 0 40px rgba(139, 92, 246, 0.05);
        }
        
        .neon-border::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, #00ff88, #8b5cf6, #00ff88);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        /* Chart Canvas Container */
        .chart-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 120px;
        }
        
        /* Sparkline Container */
        .sparkline-container {
            height: 32px;
            width: 100%;
            position: relative;
        }
        
        /* Scroll Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Touch Optimization */
        @media (hover: hover) {
            .mobile-card:hover { transform: translateY(-2px); }
        }
        
        /* Status Pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.025em;
        }
        
        .status-pill.live {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 204, 106, 0.15));
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }
        
        .status-pill.live::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Progress Bar */
        .progress-bar {
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            background: rgba(30, 41, 59, 0.5);
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // API Data Fetching Hook
        const useApiData = (endpoint) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        const response = await fetch(endpoint);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const result = await response.json();
                        setData(result);
                        setError(null);
                    } catch (err) {
                        setError(err.message);
                        console.error(`Error fetching ${endpoint}:`, err);
                    } finally {
                        setLoading(false);
                    }
                };
                
                fetchData();
                
                // Poll every 30 seconds for live updates
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, [endpoint]);
            
            return { data, loading, error };
        };
        
        // Transform API data to component format
        const transformSimivisionData = (apiData) => {
            if (!apiData?.data?.top) return [];
            return apiData.data.top.map((item, idx) => ({
                rank: idx + 1,
                name: item.name,
                breakdown: item.name ? [item.name] : [],
                market_cap: item.market_cap || 0,
                price_change_24h: item.price_change_24h || 0,
                technical_score: item.conviction || 50,
                confidence: item.conviction || 50,
                recommendation: item.recommendation || 'Hold',
                sparkline: [100, 105, 102, 108, 115, 112, 118, 122, 118, 125, 120, 126],
                netuid: item.netuid,
                emission: item.emission,
                apy: item.apy
            }));
        };
        
        // Transform subnets data for council votes
        const transformCouncilData = (apiData) => {
            if (!apiData?.subnets?.length) return null;
            const topSubnet = apiData.subnets[0];
            return {
                proposal: `Increase emission allocation for Subnet ${topSubnet.netuid || 18}`,
                subtitle: `Incentive growth for ${topSubnet.sector || 'data interoperability'}`,
                endsIn: '2d 14h',
                votes: {
                    favor: { percentage: 71.3, votes: '1.2M STAA' },
                    against: { percentage: 18.7, votes: '342K STAA' },
                    absent: { percentage: 10.0, votes: '104K STAA' },
                },
                topVoters: [
                    { name: 'Openverse Foundation', confidence: 18.2 },
                    { name: 'Textile', confidence: 8.7 },
                    { name: 'Elastic Vision', confidence: 6.1 },
                    { name: 'Block Analytics', confidence: 5.4 },
                    { name: 'Wabi Labs', confidence: 4.8 },
                ],
                totalVotes: '1.69M',
            };
        };
        
        // Transform subnet data for spotlight
        const transformSpotlightData = (apiData) => {
            if (!apiData?.subnets?.length) return null;
            const topSubnet = apiData.subnets[0];
            return {
                rank: 1,
                name: topSubnet.name || 'Unknown',
                sector: topSubnet.sector || 'Unknown',
                marketCap: (topSubnet.market_cap || 0) / 1000000,
                trend30d: topSubnet.price_change_30d || 0,
                trend7d: topSubnet.price_change_7d || 0,
                reasons: [
                    'Live data feed active',
                    'Market performance tracked',
                    'Technical analysis available',
                    'Community sentiment monitored',
                ],
                sparkline: [80, 82, 85, 88, 90, 92, 95, 98, 100, 102, 105, 108, 110, 112, 115, 118, 120, 122, 125, 127, 128, 130, 132, 135, 138, 140, 142, 145, 148, 150, 152, 155, 158, 160, 162, 165, 168, 170, 172],
                technical: {
                    rsi: { value: 64.2, status: 'Neutral' },
                    macd: { signal: 'Bullish', histogram: 'Positive' },
                    maCross: 'Bullish'
                }
            };
        };
        
        // Transform subnets data for undervalued ranking
        const transformUndervaluedData = (apiData) => {
            if (!apiData?.subnets?.length) return [];
            return apiData.subnets.slice(0, 5).map((sn, idx) => ({
                rank: idx + 1,
                name: sn.name || 'Unknown',
                sector: sn.sector || 'Unknown',
                devActivity: 'High',
                commits: 200 + idx * 50,
                mcap: (sn.market_cap || 0) / 1000000,
                mcapDevRatio: 0.1,
                trend: `${sn.price_change_24h >= 0 ? '+' : ''}${sn.price_change_24h || 0}%`,
                trendPercent: sn.price_change_24h || 0,
            }));
        };
        
        // Transform learning stats
        const transformLearningData = (apiData) => {
            if (!apiData?.data) return [];
            const stats = apiData.data;
            const now = new Date();
            return [
                { time: 'Now', message: 'Analyzing subnet performance patterns and updating stances...' },
                { time: '2m', message: 'Adjusting expert weights based on recent vote outcomes.' },
                { time: '5m', message: 'Recording learning loop updates to persistent memory.' },
                { time: '12m', message: 'Cross-referencing on-chain metrics with technical indicators.' },
                { time: '18m', message: 'Calibrating AI confidence scores based on model performance.' },
            ];
        };
        
        // Simple SVG Line Chart Component
        const SimpleLineChart = ({ data, color = '#00ff88', height = 60 }) => {
            if (!data || data.length === 0) return null;
            
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            
            const points = data.map((value, index) => {
                const x = (index / (data.length - 1)) * 100;
                const y = 100 - ((value - min) / range) * 100;
                return `${x},${y}`;
            }).join(' ');
            
            return (
                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full" style={{ height }} overflow="visible">
                    <defs>
                        <linearGradient id={`gradient-${color}`} x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stopColor={color} stopOpacity="0.3" />
                            <stop offset="100%" stopColor={color} stopOpacity="0" />
                        </linearGradient>
                    </defs>
                    <path
                        d={`M0,100 L0,${100 - ((data[0] - min) / range) * 100} ${points.split(' ').map((p, i) => `L${p}`).join(' ')} L100,100 Z`}
                        fill={`url(#gradient-${color})`}
                        stroke="none"
                    />
                    <polyline
                        points={points}
                        fill="none"
                        stroke={color}
                        strokeWidth="3"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        className="drop-shadow-sm"
                    />
                </svg>
            );
        };
        
        // Component: SimiVision Picks Card
        const SimiVisionPicksCard = ({ picks }) => (
            <section className="w-full glass-panel glass-border rounded-3xl p-4 sm:p-6 mb-4 sm:mb-6 shadow-2xl">
                <div className="flex items-center justify-between mb-4 sm:mb-6">
                    <div className="flex items-center gap-2 sm:gap-3">
                        <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-gradient-to-br from-green-400 to-purple-500 flex items-center justify-center shrink-0 shadow-lg">
                            <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                            </svg>
                        </div>
                        <div>
                            <h2 className="text-lg sm:text-xl font-bold">SimiVision Picks</h2>
                            <p className="text-xs sm:text-sm text-slate-400">Top picks by SimiVision AI</p>
                        </div>
                    </div>
                    <a href="#" className="text-xs sm:text-sm text-green-400 hover:text-green-300 font-semibold flex items-center gap-1">
                        View All
                        <svg className="w-3 h-3 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
                
                <div className="space-y-3 sm:space-y-4">
                    {picks.map((pick, idx) => (
                        <article key={idx} className="glass-panel glass-border rounded-xl sm:rounded-2xl p-3 sm:p-4 mobile-card transition-transform duration-200 shadow-lg">
                            <div className="grid sm:grid-cols-[60px_1fr_1fr_auto] gap-3 sm:gap-4 items-start">
                                <div className="flex flex-col items-center gap-1 sm:gap-2">
                                    <span className="text-xl sm:text-2xl font-black" style={{ color: '#00ff88' }}>#{pick.rank}</span>
                                    <span className="text-xs sm:text-sm font-semibold text-white text-center leading-tight">{pick.name}</span>
                                    <span className="text-[10px] xs:text-xs text-slate-400 text-center leading-tight sm:hidden">{pick.breakdown[0]}</span>
                                </div>
                                
                                <div className="flex flex-col gap-2">
                                    <div className="flex items-center justify-between">
                                        <span className="text-xs sm:text-sm text-slate-300">${(pick.market_cap / 1e6).toFixed(1)}M</span>
                                        <span className={`text-xs sm:text-sm font-semibold px-2 py-1 rounded-lg ${pick.price_change_24h >= 0 ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                            {pick.price_change_24h >= 0 ? '+' : ''}{pick.price_change_24h}% 24h
                                        </span>
                                    </div>
                                    <SimpleLineChart data={pick.sparkline} color={pick.price_change_24h >= 0 ? '#00ff88' : '#ef4444'} height={32} />
                                </div>
                                
                                <div className="flex items-center justify-between gap-2 sm:gap-3">
                                    <div className="flex flex-col items-center">
                                        <span className="text-lg sm:text-xl font-bold text-purple-400">{pick.technical_score}</span>
                                        <span className="text-[10px] xs:text-xs text-slate-400">Tech</span>
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <span className="text-lg sm:text-xl font-bold" style={{ color: '#00ff88' }}>{pick.confidence}%</span>
                                        <span className="text-[10px] xs:text-xs text-slate-400">AI</span>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col items-end gap-1 sm:gap-2">
                                    <span className={`text-xs sm:text-sm font-semibold px-2 py-1.5 rounded-lg whitespace-nowrap ${
                                        pick.recommendation.includes('Strong Buy') ? 'bg-green-500/20 text-green-400' :
                                        pick.recommendation.includes('Buy') ? 'bg-green-500/10 text-green-300' :
                                        pick.recommendation.includes('Hold') ? 'bg-yellow-500/20 text-yellow-400' :
                                        'bg-red-500/10 text-red-400'
                                    }`}>
                                        {pick.recommendation}
                                    </span>
                                    <span className="text-[10px] xs:text-xs text-slate-500 text-center sm:text-left sm:hidden">{pick.breakdown[1] || ''}</span>
                                </div>
                            </div>
                        </article>
                    ))}
                </div>
            </section>
        );
        
        // Component: Learning Trail Council Votes
        const CouncilVotesCard = ({ votes }) => (
            <section className="w-full glass-panel glass-border rounded-3xl p-4 sm:p-6 mb-4 sm:mb-6 shadow-2xl">
                <div className="flex items-center justify-between mb-4 sm:mb-6">
                    <div className="flex items-center gap-2 sm:gap-3">
                        <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center shrink-0 shadow-lg">
                            <svg className="w-5 h-5 sm:w-6 sm:h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                            </svg>
                        </div>
                        <div>
                            <h2 className="text-lg sm:text-xl font-bold">Learning Trail Council</h2>
                            <p className="text-xs sm:text-sm text-slate-400">Decentralized governance in action</p>
                        </div>
                    </div>
                    <a href="#" className="text-xs sm:text-sm text-purple-400 hover:text-purple-300 font-semibold flex items-center gap-1">
                        View All
                        <svg className="w-3 h-3 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                        </svg>
                    </a>
                </div>
                
                <article className="glass-panel glass-border rounded-xl sm:rounded-2xl p-3 sm:p-4 mobile-card shadow-lg mb-4 sm:mb-6">
                    <div className="text-center mb-4">
                        <h3 className="text-sm sm:text-base font-semibold mb-1">{votes.proposal}</h3>
                        <p className="text-xs text-slate-400 mb-1">{votes.subtitle}</p>
                        <span className="text-xs text-slate-500">Ends in: {votes.endsIn}</span>
                    </div>
                    
                    <div className="space-y-3 sm:space-y-4">
                        <div className="grid grid-cols-3 gap-2 sm:gap-4">
                            <div className="flex flex-col items-center gap-1 p-2 rounded-lg bg-green-500/5">
                                <span className="text-lg sm:text-xl font-black text-green-400">{votes.votes.favor.percentage}%</span>
                                <span className="text-[10px] xs:text-xs text-slate-400">Favor</span>
                                <span className="text-[10px] xs:text-xs text-slate-500">{votes.votes.favor.votes}</span>
                            </div>
                            <div className="flex flex-col items-center gap-1 p-2 rounded-lg bg-red-500/5">
                                <span className="text-lg sm:text-xl font-black text-red-400">{votes.votes.against.percentage}%</span>
                                <span className="text-[10px] xs:text-xs text-slate-400">Against</span>
                                <span className="text-[10px] xs:text-xs text-slate-500">{votes.votes.against.votes}</span>
                            </div>
                            <div className="flex flex-col items-center gap-1 p-2 rounded-lg bg-slate-500/5">
                                <span className="text-lg sm:text-xl font-black text-slate-400">{votes.votes.absent.percentage}%</span>
                                <span className="text-[10px] xs:text-xs text-slate-400">Absent</span>
                                <span className="text-[10px] xs:text-xs text-slate-500">{votes.votes.absent.votes}</span>
                            </div>
                        </div>
                        
                        <div className="space-y-2">
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${votes.votes.favor.percentage}%`, background: '#00ff88' }} />
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${votes.votes.against.percentage}%`, background: '#ef4444' }} />
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${votes.votes.absent.percentage}%`, background: '#94a3b8' }} />
                            </div>
                        </div>
                        
                        <div className="flex -space-x-2 sm:-space-x-3 justify-center pt-3 px-4">
                            {[...Array(5)].map((_, i) => (
                                <div key={i} className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-gradient-to-br from-purple-400 to-indigo-500 flex items-center justify-center text-xs font-bold ring-2 ring-obsidian-900 shrink-0">
                                    {String.fromCharCode(65 + i)}
                                </div>
                            ))}
                        </div>
                        
                        <div className="text-center text-xs sm:text-sm text-slate-400">
                            <strong className="text-green-400">{votes.totalVotes}</strong> Total Votes
                        </div>
                    </div>
                </article>
                
                <div className="pl-4 sm:pl-6 border-l-2 border-slate-700">
                    <h4 className="text-xs sm:text-sm font-semibold mb-2 text-slate-300">Top Council Voters</h4>
                    <div className="space-y-2 sm:space-y-3">
                        {votes.topVoters.map((voter, idx) => (
                            <div key={idx} className="flex items-center gap-2 sm:gap-3">
                                <span className="text-xs text-slate-400 min-w-[80px]">{String.fromCharCode(65 + idx)}. {voter.name}</span>
                                <span className="text-xs font-semibold text-green-400 sm:hidden">{voter.confidence}%</span>
                                <div className="progress-bar" style={{ flex: 1, height: '3px' }}>
                                    <div className="progress-fill" style={{ width: `${voter.confidence}%`, background: '#00ff88' }} />
                                </div>
                                <span className="text-xs font-semibold text-green-400 hidden sm:inline-block">{voter.confidence}%</span>
                            </div>
                        ))}
                    </div>
                </div>
            </section>
        );
        
        // Component: Spotlight
        const SpotlightCard = ({ spot }) => (
            <section className="w-full glass-panel glass-border rounded-3xl p-4 sm:p-6 mb-4 sm:mb-6 shadow-2xl">
                <div className="flex items-center justify-between mb-4 sm:mb-6">
                    <div className="flex items-center gap-2 sm:gap-3">

            const simivisionTop = transformSimivisionData(simivisionData);
            const councilVotes = transformCouncilData(subnetsData);
            const spotlight = transformSpotlightData(subnetsData);
            const undervalued = transformUndervaluedData(subnetsData);
            const learningFeed = transformLearningData(learningData);

            const isLoading = subnetsLoading || simivisionLoading || rotationLoading || mindmapLoading || learningLoading;

                        new Chart(canvas.getContext('2d'), {

                                    data: [20, 25, 22, 28, 30, 27, 32, 35, 33, 38, 40, 37, 42, 45, 43, 48, 50, 47, 52, 55],

                                    fill: false,

                                    pointRadius: 0,

                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                plugins: { legend: { display: false } },
                                scales: {

                                    y: { display: true, grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } }

            if (hasError) {

                            <p className="text-slate-500 text-sm">{subnetsError || simivisionError || rotationError || mindmapError || learningError}</p>

                    </div>
                );

            return (

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
