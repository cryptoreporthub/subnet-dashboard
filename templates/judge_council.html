<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judge Council</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="wrap">
<h1 class="section-title">Judge Council</h1>
<p class="section-sub">AI judges evaluating subnet performance</p>
<div id="content" class="card">Loading judge scores...</div>
<script>
fetch('/api/judges').then(function(r){return r.json()}).then(function(data){
  var el=document.getElementById('content');
  var judges=data.judges||[];
  if(!judges.length){el.innerHTML='<p class="empty">No judge data available.</p>';return}
  var h='<table class="tbl"><thead><tr><th>Subnet</th><th>Oracle</th><th>Echo</th><th>Pulse</th><th>Consensus</th><th>Verdict</th></tr></thead><tbody>';
  judges.forEach(function(j){
    var vc=j.consensus&&j.consensus.verdict==='bullish'?'badge-buy':j.consensus&&j.consensus.verdict==='bearish'?'badge-sell':'badge-watch';
    h+='<tr><td><b>'+(j.name||'SN'+j.netuid)+'</b><br><span class="pick-meta">SN'+j.netuid+'</span></td>'+
    '<td>'+(j.oracle?j.oracle.score.toFixed(2):'-')+'</td>'+
    '<td>'+(j.echo?j.echo.score.toFixed(2):'-')+'</td>'+
    '<td>'+(j.pulse?j.pulse.score.toFixed(2):'-')+'</td>'+
    '<td><b>'+(j.consensus?j.consensus.score.toFixed(2):'N/A')+'</b></td>'+
    '<td><span class="badge '+vc+'">'+(j.consensus?j.consensus.verdict:'N/A')+'</span></td></tr>';
  });
  h+='</tbody></table><p class="pick-meta">'+judges.length+' subnets scored</p>';
  el.innerHTML=h;
}).catch(function(e){document.getElementById('content').innerHTML='<p class="empty">Error: '+e.message+'</p>'});
</script>
</body>
</html>
