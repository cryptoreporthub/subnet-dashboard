<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>Judge Council</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:monospace;min-height:100vh;padding:20px}
h1{color:#00ff41;font-family:monospace;font-size:24px;margin-bottom:20px}
.container{max-width:1200px;margin:0 auto}
.table{width:100%;border-collapse:collapse;font-size:12px}
.th,.td{border:1px solid #222;padding:8px;text-align:left}
.th{background:#00ff41;color:#000;font-weight:bold}
tr:hover{background:#1a1a1a}
</style>
</head>
<body>
<div class="container">
<h1>⚖️ Judge Council</h1>
<div id="content"><p>Loading...</p></div>
</div>
<script>
async function load(){
const el=document.getElementById('content');
try{
const r=await fetch('/api/judges');const d=await r.json();
if(!d.judges||!d.judges.length){el.innerHTML='<p>No data</p>';return;}
let html='<table class="table"><tr><th>Subnet</th><th>Oracle</th><th>Echo</th><th>Pulse</th><th>Consensus</th><th>Verdict</th></tr>';
for(const j of d.judges.slice(0,20)){
html+=`<tr><td>${j.name||j.netuid}<br><span style="color:#555">${j.netuid}</span></td>`+
`<td>${(j.oracle.score||0.5).toFixed(2)}</td>`+
`<td>${(j.echo.score||0.5).toFixed(2)}</td>`+
`<td>${(j.pulse.score||0.5).toFixed(2)}</td>`+
`<td>${(j.consensus.score||0.5).toFixed(2)}</td>`+
`<td>${j.consensus.verdict||'neutral'}</td></tr>`;
}
html+='</table>';
el.innerHTML=html;
}catch(e){el.innerHTML='<p>Error: '+e+'</p>';}
}
load();setInterval(load,30000);
</script>
</body>
</html>
