<section class="investigation-panel wrap-pad" id="section-investigation" aria-labelledby="investigation-title">
  <h2 class="section-title" id="investigation-title">On-chain investigation</h2>
  <p class="section-sub">Wallet flows, subnet sellers, whale leaderboards — TaoStats-backed when API key is set.</p>

  <div class="investigation-grid">
    <div class="investigation-card">
      <h3>Subnet sellers</h3>
      <label>Netuid <input type="number" id="inv-netuid" min="0" max="256" value="82" class="inv-input" /></label>
      <button type="button" id="inv-sellers-btn" class="btn-secondary">Top sellers</button>
      <pre id="inv-sellers-out" class="inv-out" aria-live="polite">—</pre>
    </div>

    <div class="investigation-card">
      <h3>Wallet lookup</h3>
      <label>Coldkey <input type="text" id="inv-wallet" placeholder="5H6h1PUD…" class="inv-input inv-wallet" /></label>
      <button type="button" id="inv-wallet-btn" class="btn-secondary">Trace wallet</button>
      <pre id="inv-wallet-out" class="inv-out" aria-live="polite">—</pre>
    </div>

    <div class="investigation-card">
      <h3>Chat presets</h3>
      <div class="inv-presets">
        <button type="button" class="btn-secondary inv-preset" data-prompt="Who is selling subnet 82? Is it multiple wallets?">SN82 sellers</button>
        <button type="button" class="btn-secondary inv-preset" data-prompt="Trace wallet activity and transfers for the address I provide.">Trace wallet</button>
        <button type="button" class="btn-secondary inv-preset" data-prompt="Is the subnet owner among the recent sellers on this subnet?">Owner vs sellers</button>
      </div>
    </div>

    <div class="investigation-card investigation-card--wide">
      <h3>Whale leaderboards</h3>
      <div id="whale-leaderboards" class="whale-boards" aria-live="polite">Loading…</div>
    </div>
  </div>
</section>
