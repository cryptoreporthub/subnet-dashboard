<!-- 2. Scanner -->
<section class="row" id="section-scanner" aria-labelledby="scanner-title">
  <div class="section-label">Scanner</div>
  <h2 class="section-title" id="scanner-title">Live Subnet Scanner</h2>
  <p class="section-sub">Filter and sort the full registry — click a row for consensus detail.</p>
  <div class="card">
    <div class="card-head">
      <h3>Registry</h3>
      <span class="src-tag" id="scanner-meta">Loading…</span>
    </div>
    <div class="tab-bar" role="tablist" aria-label="Scanner filters" id="scanner-filters">
      <button type="button" class="tab-btn active" data-filter="all">All</button>
      <button type="button" class="tab-btn" data-filter="active">Active</button>
      <button type="button" class="tab-btn" data-filter="at-risk">At Risk</button>
      <button type="button" class="tab-btn" data-filter="deprecated">Deprecated</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
      <input type="search" id="scanner-search" class="chat-input input" placeholder="Search name or ID…" aria-label="Search subnets" style="flex:1;min-width:200px;margin:0;">
      <select id="scanner-sort" class="src-tag" aria-label="Sort subnets" style="padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px;color:inherit;">
        <option value="id">Sort: ID</option>
        <option value="emission">Sort: Emission</option>
        <option value="apy">Sort: APY</option>
      </select>
    </div>
    <div id="scanner-table" class="scroll-y" aria-live="polite"></div>
  </div>
</section>
