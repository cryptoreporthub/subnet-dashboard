{# F4b — yesterday daily recap (§17) #}
<section class="weekly-letter daily-recap wrap-pad" id="section-daily-recap" aria-labelledby="daily-recap-title">
  <div class="weekly-letter__head">
    <h2 class="weekly-letter__title" id="daily-recap-title">Yesterday recap</h2>
    <p class="weekly-letter__meta" id="daily-recap-date">Morning briefing · loading…</p>
    <div class="weekly-letter__actions">
      <button type="button" class="tab-btn" id="daily-letter-copy" disabled>Copy markdown</button>
      <button type="button" class="tab-btn" id="daily-letter-download" disabled>Download</button>
    </div>
  </div>
  <div id="daily-recap-root" class="weekly-letter__body is-loading" aria-live="polite" aria-busy="true">
    <div class="hydrate-skeleton" aria-hidden="true">
      <span class="hydrate-skeleton__line"></span>
      <span class="hydrate-skeleton__line hydrate-skeleton__line--med"></span>
      <span class="hydrate-skeleton__line hydrate-skeleton__line--short"></span>
    </div>
  </div>
</section>
