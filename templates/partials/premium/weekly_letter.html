{# F4 — weekly letter digest (§17) #}
<section class="weekly-letter wrap-pad" id="section-weekly-letter" aria-labelledby="weekly-letter-title">
  <div class="weekly-letter__head">
    <h2 class="weekly-letter__title" id="weekly-letter-title">Weekly letter</h2>
    <p class="weekly-letter__meta" id="weekly-letter-week">SimiVision digest · loading…</p>
    <div class="weekly-letter__actions">
      <button type="button" class="tab-btn" id="weekly-letter-copy" disabled>Copy markdown</button>
      <button type="button" class="tab-btn" id="weekly-letter-download" disabled>Download</button>
    </div>
  </div>
  <div id="weekly-letter-root" class="weekly-letter__body is-loading" aria-live="polite" aria-busy="true">
    <div class="hydrate-skeleton" aria-hidden="true">
      <span class="hydrate-skeleton__line"></span>
      <span class="hydrate-skeleton__line hydrate-skeleton__line--med"></span>
      <span class="hydrate-skeleton__line hydrate-skeleton__line--short"></span>
    </div>
  </div>
</section>
