{# §27-3a — Living Focus: one netuid the brain orients around #}
<section class="living-focus wrap-pad" id="section-living-focus" aria-labelledby="living-focus-title" data-brain-state="building" data-focus-netuid="{{ focus_netuid if focus_netuid is not none else '' }}">
  <div class="living-focus__head">
    <h2 class="living-focus__title" id="living-focus-title">Living Focus</h2>
    <p class="living-focus__sub" id="living-focus-sub">Focus · Contest · Prove it · Watch us update</p>
    <p class="living-focus__status-chip" id="living-focus-status-chip" hidden></p>
  </div>
  <div class="living-focus__body" id="living-focus-body" aria-live="polite">
    <div class="living-focus__skeleton" aria-hidden="true">
      <p class="living-focus__judges-caption">Judges (Oracle / Echo / Pulse)</p>
      <div class="living-focus__judges living-focus__judges--skeleton">
        <div class="living-focus__judge"><span class="living-focus__judge-label">Oracle</span><span class="living-focus__judge-bar"></span></div>
        <div class="living-focus__judge"><span class="living-focus__judge-label">Echo</span><span class="living-focus__judge-bar"></span></div>
        <div class="living-focus__judge"><span class="living-focus__judge-label">Pulse</span><span class="living-focus__judge-bar"></span></div>
      </div>
      <p class="living-focus__quiet">Building focus…</p>
    </div>
  </div>
  <div class="living-focus__learn" id="living-focus-learn" hidden aria-live="polite"></div>
  <div class="living-focus__evidence" id="living-focus-evidence" hidden aria-live="polite"></div>
  <div class="living-focus__trail-teaser" id="living-focus-trail-teaser" hidden aria-live="polite"></div>
  <div class="living-focus__switcher" id="living-focus-switcher" hidden></div>
  <div class="living-focus__cta" id="living-focus-cta" hidden>
    <a class="btn-secondary living-focus__share-link" id="living-focus-share-link" href="#" hidden>Open share card</a>
    <button type="button" class="btn-secondary" id="living-focus-prove-btn">Prove it: who sold this subnet?</button>
  </div>
</section>
