<!-- 11. Chat -->
<section class="row" id="section-chat" aria-labelledby="chat-title">
  <div class="section-label">Chat</div>
  <h2 class="section-title" id="chat-title">SimiVision Chat</h2>
  <p class="section-sub">Ask the intelligence layer — grounded in live mindmap context when available.</p>
  <div class="card chat-box">
    <div class="chat-log" id="chatLog" role="log" aria-live="polite">
      <div class="chat-msg bot">
        <div class="who">SIMIVISION</div>
        <div class="chat-text">Council cockpit online. Ask about subnets, picks, or learning stats.</div>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Ask SimiVision…" aria-label="Chat message" autocomplete="off">
      <button type="button" id="chatSend">Send</button>
    </div>
    <p class="chat-meta" id="chatMeta">LLM: ready</p>
  </div>
</section>
