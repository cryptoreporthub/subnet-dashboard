<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="5">
  <title>Subnet Pulse — Loading</title>
  <style>
    body { margin:0; background:#0f0f1a; color:#e0e0e0; font-family:system-ui,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; text-align:center; }
    .box { max-width:420px; padding:24px; }
    h1 { color:#c99a4b; font-size:1.4rem; margin-bottom:12px; }
    p { color:#888; line-height:1.5; }
    .spinner { width:32px; height:32px; border:3px solid #333; border-top-color:#c99a4b; border-radius:50%; margin:16px auto; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>Subnet Pulse is waking up&hellip;</h1>
    <p>Initializing data pipeline. This takes a few seconds on first load.</p>
    <p>Auto-refreshing every 5 seconds&hellip;</p>
  </div>
</body>
</html>
