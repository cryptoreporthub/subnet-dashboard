<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="5">
  <title>Subnet Pulse — Waking up…</title>
  <meta name="description" content="Live intelligence for the Bittensor subnet economy.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/simivision.css">
  <style>
    :root {
      --bg-base: #060914;
      --bg-surface: #0B1021;
      --text-primary: #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --accent-cyan: #22D3EE;
      --accent-violet: #A78BFA;
      --accent-gradient: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      --border-subtle: rgba(148, 163, 184, 0.14);
      --font-ui: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 45%),
        var(--bg-base);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      animation: drift 24s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(34, 211, 238, 0.28), transparent 70%);
      top: -180px;
      left: -120px;
      animation-duration: 28s;
    }

    .orb-2 {
      width: 720px;
      height: 720px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.24), transparent 70%);
      top: 10%;
      right: -240px;
      animation-duration: 34s;
      animation-delay: -8s;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 60px) scale(1.08); }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 0%, black 0%, transparent 75%);
    }

    .loader {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }

    .spinner {
      width: 56px;
      height: 56px;
      margin: 0 auto 32px;
      border: 3px solid rgba(34, 211, 238, 0.12);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loader p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin: 0;
      line-height: 1.6;
    }

    .loader .subtitle {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 20px;
    }

    .pulse-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 32px;
    }

    .pulse-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: dotPulse 1.6s ease-in-out infinite;
    }

    .pulse-dots span:nth-child(2) {
      animation-delay: 0.3s;
    }

    .pulse-dots span:nth-child(3) {
      animation-delay: 0.6s;
    }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid"></div>
  </div>

  <div class="loader">
    <div class="spinner"></div>
    <h1>Subnet Pulse is waking up…</h1>
    <p>Initializing data pipeline. This takes a few seconds on first load.</p>
    <div class="pulse-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p class="subtitle">Auto-refreshes every 5 seconds</p>
  </div>
</body>
</html>
