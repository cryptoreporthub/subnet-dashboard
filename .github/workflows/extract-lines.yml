name: Extract key line ranges from server_original.py
on:
  push:
    paths: ['.extract-lines-trigger']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract critical sections
        run: |
          echo "=== LINES 900-950 (around /health route) ===" > lines_diagnostic.txt
          sed -n '900,950p' server_original.py >> lines_diagnostic.txt
          echo "" >> lines_diagnostic.txt
          echo "=== LINES 4300-4360 (around / route) ===" >> lines_diagnostic.txt
          sed -n '4300,4360p' server_original.py >> lines_diagnostic.txt
          echo "" >> lines_diagnostic.txt
          echo "=== LINES 5200-5261 (end of file) ===" >> lines_diagnostic.txt
          sed -n '5200,5261p' server_original.py >> lines_diagnostic.txt
          echo "" >> lines_diagnostic.txt
          echo "=== ALL app = lines ===" >> lines_diagnostic.txt
          grep -n "^app =" server_original.py >> lines_diagnostic.txt || echo "no app = lines" >> lines_diagnostic.txt
          echo "" >> lines_diagnostic.txt
          echo "=== ALL FastAPI occurrences ===" >> lines_diagnostic.txt
          grep -n "FastAPI" server_original.py >> lines_diagnostic.txt
      - name: Commit results
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add lines_diagnostic.txt
          git diff --cached --quiet || git commit -m "diagnostic: key line ranges from server_original.py"
          git push origin main
