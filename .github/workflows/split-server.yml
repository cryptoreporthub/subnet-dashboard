name: Split server.py

on:
  push:
    paths:
      - scripts/split_server.py
      - scripts/recover_tail.py
  workflow_dispatch: {}

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Recover tail code if needed
        run: python scripts/recover_tail.py
        continue-on-error: true
      - name: Commit and push
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add -A
          git commit -m "fix: restore tail code and fix Procfile" || true
          git push