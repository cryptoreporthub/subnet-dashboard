name: CI Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci-smoke-test:
    name: CI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run smoke test
        run: |
          python -c "
          # Verify the Flask app imports and core endpoints respond.
          from server import app
          client = app.test_client()
          r = client.get('/health')
          assert r.status_code == 200, f'Health failed: {r.status_code}'
          r = client.get('/api/registry')
          assert r.status_code == 200, f'Registry failed: {r.status_code}'
          r = client.get('/api/summary')
          assert r.status_code == 200, f'Summary failed: {r.status_code}'
          print('CI SMOKE TEST PASS')
          "