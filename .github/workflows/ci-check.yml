name: CI Smoke Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci-smoke-test:
    name: CI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      
      - name: Endpoint contract + server tests
        run: python -m pytest tests/test_endpoint_contract.py tests/test_server.py -q