name: Restore server.py

on:
  push:
    paths:
      - .github/workflows/restore-server.yml
  workflow_dispatch: {}

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore original server.py
        run: |
          git checkout d44d1439bb9cc9b9005bc9ecbd588f10edc81bd7 -- server.py
      - name: Remove server/ package
        run: |
          rm -rf server/
      - name: Remove old wrappers
        run: |
          rm -f judge_app.py council_app.py
      - name: Fix Procfile
        run: |
          if [ -f Procfile ]; then
            sed -i 's/council_app:app/server:app/g' Procfile
            sed -i 's/judge_app:app/server:app/g' Procfile
          fi
      - name: Commit and push
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add -A
          git commit -m "restore: bring back original server.py monolith" || echo "no changes"
          git push
