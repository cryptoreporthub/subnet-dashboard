name: Find routes in server_original.py
on:
  workflow_dispatch:

jobs:
  grep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: grep -n "app = FastAPI" server_original.py || echo "NO APP INIT"
      - run: grep -n "/health" server_original.py || echo "NO HEALTH"
      - run: grep -n "app.mount" server_original.py || echo "NO MOUNTS"
      - run: grep -n "@app.get" server_original.py | head -20
      - run: grep -n "exception_handler" server_original.py | head -10
      - run: grep -n "StaticFiles" server_original.py | head -5
      - run: wc -l server_original.py
