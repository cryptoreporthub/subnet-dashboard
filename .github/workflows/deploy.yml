name: Deploy to Fly.io

on:
  push:
    branches: [main]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set Chutes API secrets
        run: |
          flyctl secrets set \
            CHUTES_API_KEY="cpk_f0d45191630e4ad9ade41d1e24d98e27.f69c1db28dbc537696ca25bd39e6836e.EWMHe2ksRB8vlWBbMLkcKKLgR4qT0Wfm" \
            CHUTES_BASE_URL="https://api.chutes.ai/v1" \
            CHUTES_MODEL="deepseek-ai/DeepSeek-V3.2-TEE" \
            --app subnet-dashboard
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
