name: Compile Jinja template
on:
  workflow_dispatch:
  push:
    paths: [".jinja-compile-trigger"]
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jinja2
        run: pip install jinja2
      - name: Compile template
        run: |
          python3 -c "import jinja2; env = jinja2.Environment(loader=jinja2.FileSystemLoader(\'templates\')); env.get_template(\'index.html\')" 2>&1 || echo "COMPILE FAILED"
      - name: Show error line
        run: |
          python3 << 'PYEOF'
          import jinja2
          env = jinja2.Environment(loader=jinja2.FileSystemLoader('templates'))
          try:
            env.get_template('index.html')
            print('Template compiled OK')
          except jinja2.exceptions.TemplateSyntaxError as e:
            print(f"Line {e.lineno}: {e.message}")
            print(f"Error: {e}")
          PYEOF