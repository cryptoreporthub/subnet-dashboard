name: Diagnose routes and config
on:
  push:
    branches: [diagnose-routes]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt || true
      - name: Inspect config.py around app mount
        run: |
          python3 - <<'PY'
          import re
          with open('server/config.py', 'r') as f:
              lines = f.readlines()
          for i, line in enumerate(lines):
              if 'app = FastAPI(' in line:
                  print('=== app = FastAPI at line', i+1, '===')
                  print(''.join(lines[max(0,i-3):i+8]))
              if 'app.mount("/static"' in line:
                  print('=== static mount at line', i+1, '===')
                  print(''.join(lines[max(0,i-5):i+5]))
          print('=== total lines:', len(lines))
          PY
      - name: Search for catch-all routes
        run: |
          grep -RnE '@.*"/.*{.*:path.*}|@.*"/{.*:path.*}"' server/ internal/ || echo 'no catch-all found'
          grep -RnE '@app.get|@router.get' server/ internal/ || true
      - name: List routes if import works
        run: |
          python3 -c "from server import app; routes=[f'{r.path} {type(r).__name__}' for r in app.routes]; print('\n'.join(routes))" || echo 'import failed'
      - name: Write diagnostic report
        run: |
          python3 - <<'PY'
          import re, subprocess
          with open('server/config.py', 'r') as f:
              lines = f.readlines()
          report = ['# Diagnostic Report', '']
          for i, line in enumerate(lines):
              if 'app = FastAPI(' in line:
                  report.append(f"app = FastAPI at line {i+1}")
                  report.extend(lines[max(0,i-3):i+8])
              if 'app.mount("/static"' in line:
                  report.append(f"static mount at line {i+1}")
                  report.extend(lines[max(0,i-5):i+5])
          with open('DIAGNOSTIC.md', 'w') as f:
              f.write('\n'.join(report))
          PY
      - name: Commit report
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add DIAGNOSTIC.md
          git diff --cached --quiet || git commit -m "docs: diagnostic report [skip ci]"
          git push origin HEAD || true
