# Phase K - CI Quality Gates (Report-Only, Non-Blocking)
# Per master-plan-merged.md section 9: Phase K gates must be report-only until stable
# After stability is verified, gates become blocking for main branch protection

name: Phase K - CI Quality Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: phase-k-\${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: GATE 1 - Lint (black, flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt black flake8
      - name: Run black
        run: black --check --line-length 88 .
      - name: Run flake8
        run: flake8 . --max-line-length 88

  contract-tests:
    name: GATE 2 - Contract Tests (Endpoint Parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run contract tests
        run: pytest tests/test_endpoint_contract.py -q

  security:
    name: GATE 3 - Security (bandit, safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt bandit safety
      - name: Run bandit
        run: bandit -r . --suppress-noise
      - name: Run safety
        run: safety check --full-report

  smoke-test:
    name: GATE 4 - Smoke Test (GET /health)
    runs-on: ubuntu-latest
    needs: [lint, contract-tests, security]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Start server
        run: |
          uvicorn server:app --host 0.0.0.0 --port 8080 &
          sleep 5
      - name: Health check
        run: curl --fail http://localhost:8080/health

  fly-validate:
    name: GATE 5 - Fly Deploy Validation
    runs-on: ubuntu-latest
    needs: [lint, contract-tests, smoke-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Fly CLI
        run: curl -L https://fly.io/install.sh | sh
      - name: Validate fly.toml
        run: |
          fly status --app subnet-dashboard --json || echo "Warning: App not deployed yet"
      - name: Validate procfile
        run: test -f Procfile && echo "Procfile present" || exit 1

  runtime-test:
    name: GATE 6 - Runtime Test (GET /api/subnets)
    runs-on: ubuntu-latest
    needs: [smoke-test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Start server
        run: |
          uvicorn server:app --host 0.0.0.0 --port 8080 &
          sleep 5
      - name: Test subnets endpoint
        run: curl --fail http://localhost:8080/api/subnets

  memory-check:
    name: GATE 7 - Memory Freshness (le24h)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check data files freshness
        run: |
          find data/ -type f -name "*.json" -mtime +1 -print
          test \$? -eq 1 || echo "Warning: Some data files older than 24h"

  branch-protection:
    name: GATE 8 - Branch Protection Readiness
    runs-on: ubuntu-latest
    needs: [lint, contract-tests, security, smoke-test]
    steps:
      - uses: actions/checkout@v4
      - name: Report branch protection status
        run: |
          echo "=== Branch Protection Readiness Report ==="
          echo "All previous gates passed: YES"
          echo "Recommendation: Enable branch protection after Phase K stabilization"
          echo "See: https://docs.subnet-dashboard.fly.dev/docs/master-plan-merged.md#phase-k-ci-quality-gates"
