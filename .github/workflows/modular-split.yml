# v2 inline Python splitter — triggered by push
name: Modular Split

on:
  push:
    paths:
      - .github/workflows/modular-split.yml
  workflow_dispatch: {}

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Split server.py into server/ package
        shell: python
        run: |
          import re, os, shutil, ast
          from pathlib import Path

          ROOT = Path(".")
          SRC = ROOT / "server.py"

          with open(SRC, encoding="utf-8") as f:
              lines = f.readlines()

          print(f"Read {len(lines)} lines")
          n = len(lines)

          # Find the LAST @app.<method> route function body end
          last_route_end = 0
          i = 0
          while i < n:
              s = lines[i].strip()
              if not re.match(r'^@app.(get|post|put|delete|patch|api_route)(', s):
                  i += 1
                  continue
              while i < n:
                  s2 = lines[i].strip()
                  if s2.startswith('@'):
                      i += 1
                  elif re.match(r'^(async )?def ', s2):
                      break
                  elif s2 == '' or s2.startswith('#'):
                      i += 1
                  else:
                      break
              if i >= n:
                  break
              s2 = lines[i].strip()
              if not re.match(r'^(async )?def ', s2):
                  continue
              base_indent = len(lines[i]) - len(lines[i].lstrip())
              i += 1
              while i < n:
                  body = lines[i].strip()
                  if body:
                      current_indent = len(lines[i]) - len(lines[i].lstrip())
                      if current_indent <= base_indent:
                          break
                  i += 1
              last_route_end = max(last_route_end, i)

          print(f"Last route body ends at line {last_route_end}")

          preamble = lines[:last_route_end]
          route_start = 0
          for idx, ln in enumerate(preamble):
              if re.match(r'^@app.(get|post|put|delete|patch|api_route)(', ln.strip()):
                  route_start = idx
                  break

          config_lines = preamble[:route_start]
          route_lines = preamble[route_start:]
          tail_lines = lines[last_route_end:]

          print(f"config: {len(config_lines)}, routes: {len(route_lines)}, tail: {len(tail_lines)}")

          pkg = ROOT / "server"
          shutil.rmtree(pkg, ignore_errors=True)
          pkg.mkdir(parents=True, exist_ok=True)

          # config.py
          with open(pkg / "config.py", "w", encoding="utf-8") as f:
              f.write('"""Server config."""
')
              f.writelines(config_lines)
          print("Wrote config.py")

          # routes.py
          with open(pkg / "routes.py", "w", encoding="utf-8") as f:
              f.write('"""Routes."""
')
              f.write("from fastapi import APIRouter, Request
")
              f.write("from fastapi.responses import JSONResponse, PlainTextResponse
")
              f.write("from server.config import *  # noqa: F403
")
              f.write("
")
              f.write("logger = logging.getLogger(__name__)
")
              f.write("router = APIRouter()
")
              f.write("
")
              for line in route_lines:
                  fixed = line
                  for method in ["get", "post", "put", "delete", "patch", "api_route"]:
                      fixed = fixed.replace(f"@app.{method}(", f"@router.{method}(")
                  f.write(fixed)
          print("Wrote routes.py")

          # __init__.py
          with open(pkg / "__init__.py", "w", encoding="utf-8") as f:
              f.write('"""Server package."""
')
              f.write("from server.config import *  # noqa: F403
")
              f.write("
")
              f.writelines(tail_lines)
          print("Wrote __init__.py")

          # server.py shim
          with open(ROOT / "server.py", "w", encoding="utf-8") as f:
              f.write('"""Subnet Dashboard — modular entry point."""
')
              f.write("import os
")
              f.write("from server import app
")
              f.write("
")
              f.write('if __name__ == "__main__":
')
              f.write("    import uvicorn
")
              f.write('    uvicorn.run(app, host="0.0.0.0", port=int(os.environ.get("PORT", 5000)))
')
          print("Wrote shim")

          # Cleanup
          for old in ["judge_app.py", "council_app.py",
                      "scripts/split_server.py", "scripts/recover_tail.py",
                      ".github/workflows/split-server.yml", ".github/workflows/restore-server.yml"]:
              p = ROOT / old
              if p.exists():
                  p.unlink()
                  print(f"Removed {old}")

          df = ROOT / "Dockerfile"
          if df.exists():
              c = df.read_text().replace("council_app:app", "server:app")
              df.write_text(c)
              print("Fixed Dockerfile")

          pf = ROOT / "Procfile"
          if pf.exists():
              c = pf.read_text().replace("council_app:app", "server:app").replace("judge_app:app", "server:app")
              pf.write_text(c)
              print("Fixed Procfile")

          for path in ["server.py", "server/config.py", "server/routes.py", "server/__init__.py"]:
              try:
                  with open(ROOT / path) as fh:
                      ast.parse(fh.read())
                  print(f"  {path}: OK")
              except SyntaxError as e:
                  print(f"  {path}: SYNTAX ERROR")
                  with open(ROOT / path) as fh:
                      content = fh.read()
                  lines = content.split('\n')
                  if hasattr(e, 'lineno') and e.lineno:
                      for j in range(max(0, e.lineno - 3), min(len(lines), e.lineno + 2)):
                          print(f"    {j+1}: {lines[j][:120]}")

          print("\nDone!")
      - name: Commit and push
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add -A
          git commit -m "refactor: split server.py into clean server/ package" || echo "no changes"
          git push
