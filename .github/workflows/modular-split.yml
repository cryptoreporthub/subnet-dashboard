name: Modular Split

on:
  push:
    paths:
      - scripts/modular_split.py
      - .github/workflows/modular-split.yml
  workflow_dispatch: {}

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run split
        run: python scripts/modular_split.py
      - name: Commit and push
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add -A
          git commit -m "refactor: split server.py into clean server/ package" || echo "no changes"
          git push
