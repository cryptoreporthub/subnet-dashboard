name: Inspect config.py tail
on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          echo "=== Last 50 lines of server/config.py from bb6fadf7 ==="
          git show bb6fadf729aabf007edb190e81db79416f3aca50:server/config.py | tail -50
          echo "=== Searching for app = FastAPI in that file ==="
          git show bb6fadf729aabf007edb190e81db79416f3aca50:server/config.py | grep -n "app = FastAPI" || echo "NOT FOUND"
          echo "=== Searching for app.mount in that file ==="
          git show bb6fadf729aabf007edb190e81db79416f3aca50:server/config.py | grep -n "app.mount" || echo "NOT FOUND"
          echo "=== server_original.py grep for app = FastAPI ==="
          cat server_original.py | grep -n "app = FastAPI" || echo "NOT FOUND IN server_original"
