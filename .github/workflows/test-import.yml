name: Test server_original.py import
on:
  push:
    paths: ['.test-import-trigger']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -r requirements.txt
      - name: Test import
        run: |
          python3 -c "
import server_original
print('Import OK')
print('App type:', type(server_original.app))
print('Routes:')
for route in server_original.app.routes:
    print(' ', getattr(route, 'path', '?'))
" 
      - name: Test /health route locally
        run: |
          timeout 5 python3 -c "
import uvicorn
from server_original import app
import threading, time

def run():
    uvicorn.run(app, host='127.0.0.1', port=9999, log_level='error')

t = threading.Thread(target=run, daemon=True)
t.start()
time.sleep(3)

import urllib.request
try:
    resp = urllib.request.urlopen('http://127.0.0.1:9999/health')
    print('Health status:', resp.status)
    print('Health body:', resp.read().decode())
except Exception as e:
    print('Health error:', type(e).__name__, e)
" || echo "TIMEOUT"
