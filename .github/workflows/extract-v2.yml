name: Extract key line ranges v2
on:
  push:
    paths: ['.extract2-trigger']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract critical sections
        run: |
          cat > lines_v2.txt << 'HEADER'
          === LINES 900-950 (around /health) ===
          HEADER
          sed -n '900,950p' server_original.py >> lines_v2.txt

          cat >> lines_v2.txt << 'HEADER'

          === LINES 4300-4360 (around / route) ===
          HEADER
          sed -n '4300,4360p' server_original.py >> lines_v2.txt

          cat >> lines_v2.txt << 'HEADER'

          === ALL app = lines ===
          HEADER
          grep -n "^app =" server_original.py >> lines_v2.txt || echo "(no ^app = lines)" >> lines_v2.txt

          cat >> lines_v2.txt << 'HEADER'

          === ALL FastAPI constructor lines ===
          HEADER
          grep -n "FastAPI(" server_original.py >> lines_v2.txt || echo "(no FastAPI() lines)" >> lines_v2.txt

          cat >> lines_v2.txt << 'HEADER'

          === ALL app.mount lines ===
          HEADER
          grep -n "app.mount" server_original.py >> lines_v2.txt || echo "(no app.mount lines)" >> lines_v2.txt

          cat >> lines_v2.txt << 'HEADER'

          === /health ROUTE FULL BODY ===
          HEADER
          sed -n '920,940p' server_original.py >> lines_v2.txt
      - name: Commit results
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add lines_v2.txt
          git diff --cached --quiet || git commit -m "diagnostic v2: key line ranges"
          git push origin main
