name: Extract health endpoint code
on:
  push:
    paths: ['.extract-health-trigger']
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          echo "=== APP INIT (lines 545-575) ===" > health_endpoint.txt
          sed -n '545,575p' server_original.py >> health_endpoint.txt
          echo "" >> health_endpoint.txt
          echo "=== HEALTH ENDPOINT (lines 918-945) ===" >> health_endpoint.txt
          sed -n '918,945p' server_original.py >> health_endpoint.txt
          echo "" >> health_endpoint.txt
          echo "=== HOMEPAGE (lines 4326-4350) ===" >> health_endpoint.txt
          sed -n '4326,4350p' server_original.py >> health_endpoint.txt
      - run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add health_endpoint.txt
          git commit -m "diagnostic: extract health endpoint code"
          git push origin main
