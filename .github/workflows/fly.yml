name: Fly Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy-guard:
    name: Deploy Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Static guards
        run: |
          set -e
          echo "=== GUARD 1: FastAPI + uvicorn must be declared in requirements.txt ==="
          if ! grep -qi "fastapi" requirements.txt || ! grep -qi "uvicorn" requirements.txt; then
            echo "GUARD FAIL: fastapi/uvicorn missing from requirements.txt"
            exit 1
          fi
          echo "=== GUARD 2: Procfile must start the ASGI app via uvicorn ==="
          if ! grep -qi uvicorn Procfile 2>/dev/null; then
            echo "GUARD FAIL: Procfile must reference uvicorn"
            exit 1
          fi
          echo "=== GUARD 3: single foundation — no stray server/ package or server_original.py ==="
          if [ -d server ] || [ -f server_original.py ]; then
            echo "GUARD FAIL: a second server foundation is present (server/ or server_original.py)"
            exit 1
          fi
          echo "STATIC GUARDS PASSED"
      - name: Endpoint contract guard
        run: |
          set -e
          echo "=== Enforcing endpoint contract (every route must return non-5xx / 200) ==="
          pip install -r requirements.txt
          pip install pytest httpx
          python -m pytest tests/test_endpoint_contract.py -q
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    needs: deploy-guard
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: latest  # Must be >= 0.2.71 #
      - name: Ensure data_volume exists (app primary region)
        continue-on-error: true
        run: |
          set -e
          REGION="${FLY_PRIMARY_REGION:-sjc}"
          COUNT=$(flyctl volumes list -a subnet-dashboard --json 2>/dev/null | python3 -c "
          import json,sys,os
          region=os.environ.get('FLY_PRIMARY_REGION','sjc')
          rows=json.load(sys.stdin)
          print(sum(1 for v in rows if v.get('name')=='data_volume' and v.get('region')==region))
          " 2>/dev/null || echo 0)
          if [ "$COUNT" -lt 1 ]; then
            echo "Creating data_volume in $REGION"
            flyctl volumes create data_volume --app subnet-dashboard --region "$REGION" -n 1 --yes
          else
            echo "data_volume already present in $REGION (count=$COUNT)"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_PRIMARY_REGION: sjc
      - name: Free data_volume (destroy all machines when prod is down)
        run: ./scripts/fly_volume_recover.sh
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: subnet-dashboard
          FLY_PRIMARY_REGION: sjc
      - name: Deploy to Fly (region sjc, single machine)
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "=== flyctl deploy attempt $attempt/3 (region=sjc) ==="
            if flyctl deploy --remote-only --no-cache --yes --region sjc --ha=false; then
              exit 0
            fi
            echo "deploy attempt $attempt failed — waiting 30s before retry"
            sleep 30
          done
          echo "GUARD FAIL: flyctl deploy failed after 3 attempts"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Scale to one machine (avoid split-brain on volume)
        continue-on-error: true
        run: flyctl scale count 1 --app subnet-dashboard --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # flyctl treats "stopped" as a good post-deploy state; a started machine
      # with critical checks is also unreachable (proxy: no good candidate).
      # Force start/restart + verify public /health before declaring success.
      - name: Ensure machine is healthy
        run: |
          set -e
          echo "=== Machine status before recover ==="
          flyctl status -a subnet-dashboard || true
          flyctl machines list -a subnet-dashboard || true
          for id in $(flyctl machines list -a subnet-dashboard --json | python3 -c "
          import json,sys
          for m in json.load(sys.stdin):
              print(m.get('id',''))
          "); do
            [ -n "$id" ] || continue
            state=$(flyctl machines list -a subnet-dashboard --json | python3 -c "
          import json,sys
          want='$id'
          for m in json.load(sys.stdin):
              if m.get('id')==want:
                  print(m.get('state','')); break
          ")
            echo "Machine $id state=$state — restarting to clear critical checks / apply VM size"
            flyctl machines restart "$id" -a subnet-dashboard || flyctl machines start "$id" -a subnet-dashboard || true
          done
          echo "=== Machine status after recover ==="
          flyctl machines list -a subnet-dashboard || true
          for i in $(seq 1 30); do
            code=$(curl -sS -m 10 -o /tmp/health_body -w "%{http_code}" https://subnet-dashboard.fly.dev/health || echo 000)
            body=$(cat /tmp/health_body 2>/dev/null || true)
            echo "attempt $i: HTTP $code body=$body"
            if [ "$code" = "200" ]; then
              echo "Public health OK"
              exit 0
            fi
            sleep 5
          done
          echo "=== Recent logs (best effort) ==="
          flyctl logs -a subnet-dashboard --no-tail || true
          echo "GUARD FAIL: public /health did not return 200 within ~2.5m"
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
