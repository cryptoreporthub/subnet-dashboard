name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy-guard:
    name: Deploy Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Deploy Guards
        run: |
          set -e
          echo "=== GUARD 1: FastAPI + uvicorn must be in requirements.txt ==="
          if ! grep -niE "uvicorn|fastapi" requirements.txt; then
            echo "GUARD FAIL: uvicorn/fastapi missing from requirements.txt"
            exit 1
          fi
          echo "=== GUARD 2: Procfile must reference uvicorn ==="
          if ! grep -ni uvicorn Procfile 2>/dev/null; then
            echo "GUARD FAIL: uvicorn missing from Procfile"
            exit 1
          fi
          echo "=== GUARD 3: no stray server/ package or server_original.py ==="
          if [ -d server ] || [ -f server_original.py ]; then
            echo "GUARD FAIL: server/ package or server_original.py present"
            exit 1
          fi
          echo "=== GUARD 4: server.py must exist and compile ==="
          python -m py_compile server.py
          echo "ALL GUARDS PASSED"
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    needs: deploy-guard
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: latest  # Must be >= 0.2.71 #
      - run: flyctl deploy --remote-only --no-cache --force-rebuild
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
