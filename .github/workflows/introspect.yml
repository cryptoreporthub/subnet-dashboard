name: Introspect app routes
on:
  push:
    paths: ['.introspect-trigger']
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt
      - name: List all routes and handlers
        run: |
          python3 -c "
from server_original import app
from fastapi.routing import APIRoute, Mount
print('=== ROUTES ===')
for r in app.routes:
    if isinstance(r, APIRoute):
        print(f'APIRoute  {r.methods} {r.path}')
    elif isinstance(r, Mount):
        print(f'Mount     {r.path} -> {r.app}')
    else:
        print(f'{type(r).__name__:10} {getattr(r, "path", "?")}')
print()
print('=== EXCEPTION HANDLERS ===')
for exc, handler in app.exception_handlers.items():
    print(f'{exc.__name__ if hasattr(exc, "__name__") else exc}: {handler}')
print()
print('=== app.state keys ===')
print(list(app.state.__dict__.keys()))
"
