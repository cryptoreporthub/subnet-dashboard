name: CI Smoke Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Compile Python
        run: python -m py_compile server.py

      - name: Run smoke test
        run: |
          python -c "
          from server import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          assert client.get('/health').status_code == 200
          assert client.get('/api/whales/summary').status_code == 200
          print('smoke OK')
          "

      - name: Run unit tests
        run: pytest tests/test_whale_intelligence.py tests/test_ruggers_watchlist.py tests/test_server.py -q