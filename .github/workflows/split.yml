name: Split Server

on:
  push:
    paths:
      - .github/workflows/split.yml
  workflow_dispatch: {}

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore original server.py
        run: |
          git restore -s 5de12060 -- server.py
          echo "server.py: $(wc -c < server.py) bytes"
      - name: Delete old split artifacts
        run: |
          rm -rf server/
          rm -f judge_app.py council_app.py
          rm -f scripts/split_server.py scripts/recover_tail.py scripts/modular_split.py
          rm -f .github/workflows/split-server.yml .github/workflows/restore-server.yml .github/workflows/modular-split.yml .github/workflows/restore-server.yml
      - name: Decode and run splitter
        run: |
          echo '' | base64 -d > /tmp/split.py
          python3 /tmp/split.py
      - name: Commit and push
        run: |
          git config user.name Ditto
          git config user.email ditto@heyditto.ai
          git add -A
          git commit -m "refactor: split server.py into clean server/ package" || echo "no changes"
          git push
      - name: Cleanup workflow file
        run: rm -f .github/workflows/split.yml