name: Extract lines 548 via Python
on:
  workflow_dispatch:
  push:
    paths: [".extract-py-trigger"]

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract lines via Python
        run: |
          python3 -c "
with open('server_original.py') as f:
    lines = f.readlines()
for i in range(540, 580):
    print(f'{i+1}:{lines[i].rstrip()}')
" > lines_548.txt
      - name: Commit
        run: |
          git config user.name "Ditto"
          git config user.email "ditto@heyditto.ai"
          git add lines_548.txt
          git commit -m "diagnostic: lines 548-580"
          git push
